<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Patient Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff7fa,#ffeef5,#fdf2f8);
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    width:100%;
    max-width:430px;
    background:white;
    border:none;
    border-radius:24px;
    box-shadow:0 18px 38px rgba(236,72,153,.10);
}

.brand-circle{
    width:72px;
    height:72px;
    border-radius:50%;
    background:linear-gradient(135deg,#f9a8d4,#ec4899);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    margin:auto;
}

.title{
    color:#db2777;
    font-weight:700;
}

.subtitle{
    color:#9d174d;
    font-size:14px;
}

.form-control{
    border-radius:14px;
    padding:12px;
    border:1px solid #fbcfe8;
}

.form-control:focus{
    border-color:#ec4899;
    box-shadow:0 0 0 .15rem rgba(236,72,153,.12);
}

.btn-pink{
    background:linear-gradient(90deg,#ec4899,#db2777);
    color:white;
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:600;
}

.btn-pink:hover{
    color:white;
    opacity:.96;
}
</style>

</head>
<body>

<div class="card login-card p-5">

<div class="text-center mb-4">



<h2 class="title mb-1">Patient Portal</h2>

<p class="subtitle mb-0">
Secure access to your care records
</p>

</div>

<form method="POST">
{% csrf_token %}

<label class="mb-2 fw-semibold">Full Name</label>
<input
type="text"
name="name"
class="form-control mb-3"
required>

<label class="mb-2 fw-semibold">Email Address</label>
<input
type="email"
name="email"
class="form-control mb-4"
required>

<button type="submit" class="btn btn-pink w-100">
Login
</button>

</form>

<div class="text-center mt-4">
    <p class="mb-2">New patient?</p>
    <a href="/register/" class="btn btn-outline-danger w-100 rounded-pill">
        Register Here
    </a>
</div>

{% if error %}
<div class="alert alert-danger mt-3 mb-0">
{{ error }}
</div>
{% endif %}

</div>

</body>
</html>
