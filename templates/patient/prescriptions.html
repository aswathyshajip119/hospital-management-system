{% extends 'patient/base.html' %}

{% block content %}

<h2>My Prescriptions</h2>
<p class="text-muted">Medicines and doctor instructions</p>

<div class="row mt-4">

<!-- Left List -->
<div class="col-md-4">
<div class="list-group">

{% for p in prescriptions %}
<button
class="list-group-item list-group-item-action {% if forloop.first %}active{% endif %}"
data-bs-toggle="list"
data-bs-target="#pres{{ p.id }}"
type="button">

<strong>Dr. {{ p.doctor.name }}</strong><br>
<small>{{ p.date }}</small>

</button>
{% endfor %}

</div>
</div>

<!-- Right Detail -->
<div class="col-md-8">
<div class="tab-content">

{% for p in prescriptions %}
<div
class="tab-pane fade {% if forloop.first %}show active{% endif %}"
id="pres{{ p.id }}">

<div class="card p-4">
<h4>Prescription</h4>
<p class="text-muted">{{ p.date }}</p>

<hr>

<h6>Medicine</h6>
<p>{{ p.medicine }}</p>

<h6>Doctor Notes</h6>
<p>{{ p.notes }}</p>

</div>
</div>
{% endfor %}

</div>
</div>

</div>

{% endblock %}
