<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Bills</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff7fa,#ffeef5,#fdf2f8);
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:100%;
    max-width:700px;
    border-radius:20px;
    padding:30px;
}

.btn-pink{
    background:linear-gradient(90deg,#ec4899,#db2777);
    color:white;
    border:none;
    border-radius:10px;
}
</style>

</head>
<body>

<div class="card shadow">

<h3 class="text-center mb-4 text-danger">My Bills</h3>

<div class="d-flex justify-content-start mb-3">
    <a href="/dashboard/" class="btn btn-outline-danger rounded-pill px-3">
        ← Back
    </a>
</div>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for bill in bills %}
        <tr>
            <td>{{ bill.id }}</td>
            <td>₹{{ bill.amount }}</td>
            <td>{{ bill.status }}</td>
            <td>
                {% if bill.status != "Paid" %}
                    <a href="/pay/{{ bill.id }}/" class="btn btn-pink btn-sm">Pay</a>
                {% else %}
                    <span class="text-success">Paid</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</div>

</body>
</html>
