<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffe4ec,#fdf2f8,#fff1f2);
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-box{
    width:100%;
    max-width:600px;
    background:white;
    border:none;
    border-radius:24px;
    box-shadow:0 18px 40px rgba(236,72,153,.15);
}

.title{
    color:#db2777;
    font-weight:700;
}

.subtitle{
    color:#9f1239;
    font-size:14px;
}

.form-control,
.form-select{
    border-radius:14px;
    padding:12px;
    border:1px solid #f9a8d4;
}

.form-control:focus,
.form-select:focus{
    border-color:#ec4899;
    box-shadow:0 0 0 .15rem rgba(236,72,153,.15);
}

.btn-pink{
    background:linear-gradient(90deg,#ec4899,#db2777);
    color:white;
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:600;
}

.btn-pink:hover{
    color:white;
    opacity:.95;
}

.small-link{
    text-decoration:none;
}
</style>

</head>
<body>

<div class="card card-box p-5">

<div class="text-center mb-4">
<h2 class="title mb-1">Book Appointment</h2>
<p class="subtitle mb-0">Choose your doctor and preferred date</p>
</div>

<form method="POST">
{% csrf_token %}

<label class="mb-2 fw-semibold">Select Doctor</label>

<select name="doctor" class="form-select mb-4" required>
<option value="">Choose Doctor</option>

{% for doc in doctors %}
<option value="{{ doc.id }}">
Dr. {{ doc.name }} - {{ doc.specialization }}
</option>
{% endfor %}

</select>

<label class="mb-2 fw-semibold">Appointment Date</label>

<input
type="date"
name="date"
class="form-control mb-4"
required>

<button type="submit" class="btn btn-pink w-100">
Book Appointment
</button>

</form>

<div class="text-center mt-4">
<a href="/dashboard/" class="small-link text-secondary">
← Back to Dashboard
</a>
</div>

</div>

</body>
</html>
