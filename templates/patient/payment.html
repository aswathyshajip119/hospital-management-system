<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff7fa,#ffeef5,#fdf2f8);
    display:flex;
    align-items:center;
    justify-content:center;
}

.payment-card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:24px;
    box-shadow:0 18px 38px rgba(236,72,153,.10);
    padding:40px;
    text-align:center;
}

.title{
    color:#db2777;
    font-weight:700;
}

.subtitle{
    color:#9d174d;
    font-size:14px;
}

.amount-box{
    background:#fff1f7;
    border-radius:16px;
    padding:20px;
    margin:20px 0;
    font-size:24px;
    font-weight:600;
    color:#be185d;
}

.btn-pink{
    background:linear-gradient(90deg,#ec4899,#db2777);
    color:white;
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:600;
    width:100%;
}

.btn-pink:hover{
    color:white;
    opacity:.95;
}
</style>

</head>
<body>

<div class="payment-card">

<h2 class="title mb-2">Hospital Payment</h2>
<p class="subtitle">Complete your bill securely</p>

<div class="amount-box">
₹{{ bill.amount }}
</div>


<a href="/pay/{{ bill.id }}/" class="btn btn-pink">
    Pay Now
</a>

</div>

</body>
</html>
