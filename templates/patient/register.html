<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Patient Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff7fa,#ffeef5,#fdf2f8);
    display:flex;
    align-items:center;
    justify-content:center;
}

.form-card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:24px;
    box-shadow:0 18px 38px rgba(236,72,153,.10);
    padding:30px;
}

.title{
    color:#db2777;
    font-weight:700;
}

.subtitle{
    color:#9d174d;
    font-size:14px;
}

.form-control{
    border-radius:14px;
    padding:10px;
    border:1px solid #fbcfe8;
}

.form-control:focus{
    border-color:#ec4899;
    box-shadow:0 0 0 .15rem rgba(236,72,153,.12);
}

.btn-pink{
    background:linear-gradient(90deg,#ec4899,#db2777);
    color:white;
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:600;
}

.btn-pink:hover{
    color:white;
    opacity:.95;
}
</style>

</head>
<body>

<div class="form-card">

<div class="text-center mb-4">
    <h2 class="title">Patient Registration</h2>
    <p class="subtitle">Create your account to access services</p>
</div>

<form method="POST">
{% csrf_token %}

<label class="mb-2 fw-semibold">Full Name</label>
<input type="text" name="name" class="form-control mb-3" required>

<label class="mb-2 fw-semibold">Age</label>
<input type="number" name="age" class="form-control mb-3" required>

<label class="mb-2 fw-semibold">Gender</label>
<input type="text" name="gender" class="form-control mb-3" required>

<label class="mb-2 fw-semibold">Phone</label>
<input type="text" name="phone" class="form-control mb-3" required>

<label class="mb-2 fw-semibold">Email</label>
<input type="email" name="email" class="form-control mb-3" required>

<label class="mb-2 fw-semibold">Address</label>
<textarea name="address" class="form-control mb-4" rows="3" required></textarea>

<button type="submit" class="btn btn-pink w-100">
    Register
</button>

</form>

</div>

</body>
</html>
