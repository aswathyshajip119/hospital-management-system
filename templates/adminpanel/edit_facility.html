<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit OP Timing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#0f172a;color:white;}
.card-box{
background:#111827;
border:none;
border-radius:20px;
color:white;
}
.form-control{
background:#1f2937;
border:none;
color:white;
}
</style>
</head>

<body>

<div class="container py-5">

<div class="card card-box p-5 mx-auto" style="max-width:650px;">

<h3 class="mb-4">
{{ doctor.name }}
</h3>

<form method="POST">
{% csrf_token %}

<label class="mb-2">Available Days</label>
<input type="text"
name="available_days"
value="{{ doctor.available_days }}"
class="form-control mb-3"
placeholder="Mon-Sat">

<label class="mb-2">OP Time</label>
<input type="text"
name="op_time"
value="{{ doctor.op_time }}"
class="form-control mb-4"
placeholder="9 AM - 1 PM">

<button type="submit"
class="btn btn-primary w-100">

Save Changes

</button>

</form>

</div>

</div>

</body>
</html>
