<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Bill</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
}

.card-box{
    background:#111827;
    border:none;
    border-radius:20px;
    color:white;
}

.form-control{
    background:#1f2937;
    border:none;
    color:white;
}

.form-control:focus{
    background:#1f2937;
    color:white;
    box-shadow:none;
}
</style>

</head>
<body>

<div class="container py-5">

<div class="card card-box p-5 mx-auto" style="max-width:650px;">

<h3 class="mb-4">Add Bill</h3>

<form method="POST">
{% csrf_token %}

<label class="mb-2">Select Patient</label>
<select name="patient" class="form-control mb-3" required>
    {% for p in patients %}
        <option value="{{ p.id }}">{{ p.name }}</option>
    {% endfor %}
</select>

<label class="mb-2">Description</label>
<input type="text" name="description"
class="form-control mb-3" required>

<label class="mb-2">Amount</label>
<input type="number" name="amount"
class="form-control mb-4" required>

<button type="submit"
class="btn btn-success w-100">

Create Bill

</button>

</form>

</div>

</div>

</body>
</html>
