<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:white;
}

.card-box{
    background:#111827;
    border:none;
    border-radius:22px;
    color:white;
}

.form-control,
.form-select{
    background:#1f2937;
    border:none;
    color:white;
}

.form-control:focus,
.form-select:focus{
    background:#1f2937;
    color:white;
    box-shadow:none;
}

.readonly-box{
    background:#1e293b;
    border-radius:12px;
    padding:12px;
}
</style>

</head>
<body>

<div class="container py-5">

<div class="card card-box p-5 mx-auto" style="max-width:650px;">

<h3 class="mb-4">Edit Appointment</h3>

<form method="POST">
{% csrf_token %}

<label class="mb-2">Patient</label>
<div class="readonly-box mb-3">
{{ appointment.patient.name }}
</div>

<label class="mb-2">Doctor</label>

<select name="doctor" class="form-select mb-3">

{% for d in doctors %}
<option value="{{ d.id }}"
{% if appointment.doctor.id == d.id %}selected{% endif %}>
Dr. {{ d.name }} - {{ d.specialization }}
</option>
{% endfor %}

</select>

<label class="mb-2">Date</label>

<input
type="date"
name="date"
value="{{ appointment.date|date:'Y-m-d' }}"
class="form-control mb-4">

<button type="submit"
class="btn btn-primary w-100">

Save Changes

</button>

</form>

</div>

</div>

</body>
</html>
