<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background:linear-gradient(135deg,#020617,#0f172a,#111827);
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    width:100%;
    max-width:430px;
    background:rgba(17,24,39,.95);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    box-shadow:0 20px 45px rgba(0,0,0,.45);
}

.form-control{
    background:#1f2937;
    border:none;
    color:white;
    border-radius:14px;
    padding:12px;
}

.form-control:focus{
    background:#1f2937;
    color:white;
    box-shadow:none;
    border:1px solid #6366f1;
}

.btn-admin{
    background:#6366f1;
    color:white;
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:600;
}

.btn-admin:hover{
    background:#4f46e5;
    color:white;
}

.muted{
    color:#94a3b8;
}
</style>

</head>
<body>

<div class="card login-card p-5">

<div class="text-center mb-4">
<div style="font-size:44px;">🛡️</div>
<h2 class="text-white mt-2">Admin Portal</h2>
<p class="muted mb-0">Secure system access</p>
</div>

<form method="POST">
{% csrf_token %}

<label class="text-white mb-2">Username</label>
<input type="text" name="username" class="form-control mb-3" required>

<label class="text-white mb-2">Password</label>
<input type="password" name="password" class="form-control mb-4" required>

<button type="submit" class="btn btn-admin w-100">
Login
</button>

</form>

{% if error %}
<div class="alert alert-danger mt-3 mb-0">
{{ error }}
</div>
{% endif %}

</div>

</body>
</html>
