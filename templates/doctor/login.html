<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Doctor Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#ccfbf1,#f0fdfa);
    min-height:100vh;
}

.login-card{
    border:none;
    border-radius:22px;
    box-shadow:0 10px 25px rgba(15,118,110,.15);
}

.brand-circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:linear-gradient(135deg,#14b8a6,#0f766e);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    margin:auto;
}

.btn-teal{
    background:#14b8a6;
    color:white;
    border:none;
}

.btn-teal:hover{
    background:#0f766e;
    color:white;
}

.form-control{
    border-radius:12px;
}

.small-text{
    color:#6b7280;
}
</style>

</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="col-md-5">

<div class="card login-card p-4">

<div class="brand-circle mb-3">
🩺
</div>

<h3 class="text-center mb-1">Doctor Portal</h3>
<p class="text-center small-text mb-4">
Secure access to today's appointments
</p>

<form method="POST">
{% csrf_token %}

<label class="mb-1">Doctor ID</label>
<input type="number" name="doctor_id" class="form-control mb-3" required>

<label class="mb-1">Email Address</label>
<input type="email" name="email" class="form-control mb-3" required>

<button type="submit" class="btn btn-teal w-100 py-2">
Login
</button>

</form>

{% if error %}
<div class="alert alert-danger mt-3 mb-0">
{{ error }}
</div>
{% endif %}

</div>

</div>
</div>

</body>
</html>
